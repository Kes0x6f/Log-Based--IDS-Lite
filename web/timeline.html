<div class="main">
  <div class="topbar">
    <span class="topbar-crumb">Log-IDS</span><span class="topbar-sep"> / </span><span class="topbar-page">attack-timeline</span>
    <div class="topbar-right"><span class="topbar-clock" id="topbar-clock">--:--:--</span></div>
  </div>
  <div class="page">

    <!-- 24h chart -->
    <div class="panel">
      <div class="panel-title">Alert Volume — Last 24 Hours</div>
      <div style="position:relative;width:100%;height:140px">
        <canvas id="timeChart"></canvas>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <input class="f-input" id="f-ip" type="text" placeholder="filter by IP…" oninput="render()">
      <select class="f-select" id="f-sev" onchange="render()">
        <option value="">All severities</option>
        <option value="CRITICAL">Critical</option>
        <option value="HIGH">High</option>
        <option value="MEDIUM">Medium</option>
        <option value="LOW">Low</option>
      </select>
      <select class="f-select" id="f-window" onchange="load()">
        <option value="3600000">Last 1 hour</option>
        <option value="21600000">Last 6 hours</option>
        <option value="86400000" selected>Last 24 hours</option>
        <option value="0">All time</option>
      </select>
      <select class="f-select" id="f-group" onchange="render()">
        <option value="ip">Group by IP</option>
        <option value="time">Flat chronological</option>
      </select>
      <span class="f-stat" id="f-stat">loading…</span>
    </div>

    <div id="tl-outer" class="tl-outer"><div class="empty">loading…</div></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const el=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function fmtClock(){const f=localStorage.getItem('ids-clock-fmt')||'utc';const n=new Date();if(f==='local24')return n.toLocaleTimeString('en-GB',{hour12:false})+' local';if(f==='local12')return n.toLocaleTimeString('en-US',{hour12:true})+' local';return n.toUTCString().slice(17,25)+' UTC';}
const tick=()=>{const s=fmtClock();el('topbar-clock').textContent=s;el('footer-time').textContent=s};
setInterval(tick,1000);tick();
const SEV_DOT={CRITICAL:'#f87171',HIGH:'#fb923c',MEDIUM:'#fbbf24',LOW:'#34d399'};
const pill=sev=>`<span class="pill pill-${(sev||'').toLowerCase()}">${esc(sev)}</span>`;
const fmtTs=ts=>{const d=new Date(ts);return isNaN(d)?'—':d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour12:false})};

let allAlerts=[], chart=null;
const LIMIT = parseInt(localStorage.getItem('ids-alerts-limit') || '2000');

async function load(){
  const windowMs=+el('f-window').value;
  const cutoff=windowMs>0?Date.now()-windowMs:0;
  try{const r=await fetch(`/alerts?limit=${LIMIT}`);allAlerts=r.ok?(await r.json()??[]):[];}catch{allAlerts=[];}
  if(cutoff)allAlerts=allAlerts.filter(a=>new Date(a.Timestamp)>=cutoff);

  updateCriticalBadge();

  buildChart();
  render();
}

function buildChart(){
  const bins=new Array(24).fill(0);
  const now=Date.now();
  allAlerts.forEach(a=>{
    const h=Math.floor((now-new Date(a.Timestamp))/3600000);
    if(h>=0&&h<24)bins[23-h]++;
  });
  const labels=bins.map((_,i)=>{const h=23-i;return h===0?'now':`-${h}h`});
  const gc='rgba(96,130,200,0.07)',tc='#3d5070';
  if(!chart){
    chart=new Chart(el('timeChart'),{
      type:'bar',
      data:{labels,datasets:[{label:'Alerts',data:bins,backgroundColor:'rgba(56,189,248,0.2)',borderColor:'#38bdf8',borderWidth:1,borderRadius:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:tc,font:{size:9,family:"'JetBrains Mono'"},maxTicksLimit:12,autoSkip:true},grid:{color:gc},border:{display:false}},
          y:{min:0,ticks:{color:tc,font:{size:9,family:"'JetBrains Mono'"},maxTicksLimit:4,stepSize:1},grid:{color:gc},border:{display:false}}}}
    });
  } else {
    chart.data.labels=labels;chart.data.datasets[0].data=bins;chart.update('none');
  }
}

function render(){
  const ipQ=el('f-ip').value.toLowerCase();
  const sev=el('f-sev').value;
  const group=el('f-group').value;

  let alerts=[...allAlerts].filter(a=>{
    if(sev&&a.Severity!==sev)return false;
    if(ipQ&&!(a.SourceIP||'').toLowerCase().includes(ipQ))return false;
    return true;
  }).sort((a,b)=>new Date(b.Timestamp)-new Date(a.Timestamp));

  el('f-stat').innerHTML=`<strong>${alerts.length}</strong> alerts`;
  const box=el('tl-outer');
  if(!alerts.length){box.innerHTML='<div class="empty">no alerts in selected window</div>';return;}

  if(group==='time'){
    // Flat list capped at 200
    const shown=alerts.slice(0,200);
    box.innerHTML=`<div class="tl-group">
      <div class="tl-group-header"><div class="tl-group-ip">All Events</div><div class="tl-group-meta">latest <strong>${shown.length}</strong></div></div>
      <div class="tl-events">${shown.map(a=>eventHTML(a)).join('')}</div>
    </div>`;
    return;
  }

  // Group by IP
  const byIP={};
  alerts.forEach(a=>{
    const ip=a.SourceIP||'—';
    if(!byIP[ip])byIP[ip]=[];
    byIP[ip].push(a);
  });
  const groups=Object.entries(byIP).sort((a,b)=>new Date(b[1][0].Timestamp)-new Date(a[1][0].Timestamp));

  box.innerHTML=groups.map(([ip,events])=>`<div class="tl-group">
    <div class="tl-group-header">
      <div class="tl-group-ip">${esc(ip)}</div>
      <div class="tl-group-meta"><strong>${events.length}</strong> alerts · last ${fmtTs(events[0].Timestamp)}</div>
      <a class="ip-link" href="/ip-profile.html?ip=${encodeURIComponent(ip)}">profile →</a>
    </div>
    <div class="tl-events">${events.slice(0,20).map(a=>eventHTML(a)).join('')}</div>
  </div>`).join('');
}

function eventHTML(a){
  const dotColor=SEV_DOT[a.Severity]||'#3d5070';
  // Show TargetUser when it differs from Username — key info for brute-force timeline
  const userTag = a.TargetUser&&a.TargetUser!==''
    ? `<span style="font-size:10px;font-family:var(--font-mono);color:var(--text-3);margin-left:4px">→ ${esc(a.TargetUser)}</span>`
    : '';
  // Show FailCount when populated — gives scale at a glance
  const failTag = a.FailCount>0
    ? `<span style="font-size:10px;font-family:var(--font-mono);color:var(--red);margin-left:4px">${a.FailCount} fails</span>`
    : '';
  return`<div class="tl-event">
    <div class="tl-left">
      <div class="tl-dot" style="border-color:${dotColor};background:${dotColor}22"></div>
      <div class="tl-line"></div>
    </div>
    <div class="tl-content">
      <div class="tl-event-top">
        <span class="tl-ts">${fmtTs(a.Timestamp)}</span>
        ${pill(a.Severity)}
        <span class="tl-rule"><a href="/alert-detail.html?id=${encodeURIComponent(a.ID)}" style="color:var(--text);text-decoration:none">${esc(a.RuleName||'—')}</a></span>
        ${userTag}${failTag}
        <span class="tl-cnt">×${a.EventCount||1}</span>
      </div>
      <div class="tl-msg">${esc(a.Message||'')}</div>
    </div>
  </div>`;
}
async function updateCriticalBadge() {
  try {
    const r = await fetch('/alerts/severity-count?severity=CRITICAL');
    if (!r.ok) return;

    const data = await r.json();
    const badge = document.getElementById('nav-crit');

    if (badge) {
      badge.textContent = data.count > 0 ? data.count : '—';
    }
  } catch {
    const badge = document.getElementById('nav-crit');
    if (badge) badge.textContent = '—';
  }
}

updateCriticalBadge();
setInterval(updateCriticalBadge, 15000);

load();
setInterval(load,20000);
</script>
